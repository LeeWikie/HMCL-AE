ai.settings.advanced.approval_mode=Approval Mode: Auto
ai.settings.advanced.approval_mode.desc=Read-only/network/regular writes pass automatically; dangerous operations ask for confirmation as appropriate, and are blocked outright (never silently allowed) if the task may be unattended
ai.settings.advanced.approval_mode.detail=Read-only, network and regular write operations pass automatically without confirmation.\n\nDangerous operations (destructive shell commands, deleting instances, etc.) prompt you while you are actually attending (this can be turned off via 'Dangerous Operation Confirmation' in the Skills tab, after which they also pass automatically).\n\nBut if the task may be unattended (e.g. the AI auto-continues after a background job finishes), dangerous operations are blocked outright and never executed silently — this rule is unaffected by the toggle above and cannot be bypassed by switching to a 'looser' mode, because Auto is now the only mode.\n\nCritical operations (deleting saves / editing NBT / deleting backups, etc.) have their own separate red confirmation, following the same rules.
ai.settings.advanced.approval_mode.title=About Approval Mode
ai.settings.advanced.critical_confirm=Red Confirmation for Critical Operations
ai.settings.advanced.critical_confirm.desc=Show an extra red confirmation before critical operations like deleting saves/editing NBT/deleting backups (strongly recommended; takes effect after restart)
ai.settings.advanced.max_tool_cycles=Max Tool-Call Rounds
ai.settings.advanced.max_tool_cycles.desc=Maximum consecutive tool calls within a single reply (runaway protection)
ai.settings.advanced.nbt_tools=Enable Save NBT Editing Tools
ai.settings.advanced.nbt_tools.desc=Off by default: high risk — lets the AI read/write save/player NBT data directly (nbt tool domain). Enable manually only for fine-grained save editing; takes effect after restart
ai.settings.advanced.request_timeout=Request Timeout
