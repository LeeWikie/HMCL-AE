ai.settings.advanced.shell.confirm=The shell tool can run arbitrary system commands. Installing mods / changing memory / managing saves / switching Java all have dedicated, safer tools; enabling shell is only recommended for edge cases those tools do not cover. Enable it?
ai.settings.advanced.shell.desc=Off by default: regular operations are covered by dedicated tools; enable manually only for edge cases (takes effect after restart)
