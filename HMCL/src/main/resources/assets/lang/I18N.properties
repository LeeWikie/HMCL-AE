ai.chat.plan_badge=Plan Mode
ai.chat.privacy.text=When you use the AI assistant, your conversation content is sent over the network to the AI service provider you configured, in order to generate replies.\n\nDepending on the features you enable, the data sent may include: your questions; game information such as the selected instance / mods / worlds; files or logs you explicitly ask the AI to read; clipboard text; and screenshots (only when you use the related features).\n\nThis data is processed by the third-party AI provider under its own privacy policy. In addition, HMCL-AE itself records a complete local trace of conversations and tool calls by default (for troubleshooting; can be disabled in AI Settings), stored locally only; you may also manually send it to the developers for diagnostics when reporting an issue — that is the only additional upload path, and it is never automatic.\n\nClicking OK means you have read and agree to the data handling described above; if you do not agree, please do not use the AI assistant.
ai.chat.privacy.title=AI Privacy & Data Notice
