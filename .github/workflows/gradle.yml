name: Java CI

on:
  push:
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:

    runs-on: ubuntu-latest
    # The AI test suite runs against classpath-loaded JavaFX under Monocle (see the -PmonocleTest
    # gate in build.gradle.kts); under this job's modular JavaFX + headless Linux it instead hangs
    # in JavaFX's GTK toolkit startup with no display, and used to sit idle until GitHub's 6h ceiling
    # cancelled it. This bound makes it fail fast and stop occupying a runner. A normal build is 1-2 min.
    timeout-minutes: 40

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'
        java-package: 'jdk+fx'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-cleanup: never
    - name: Build with Gradle
      run: ./gradlew build --no-daemon --parallel
      env:
        MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
        CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    - name: Get short SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
    - name: Upload JAR
      uses: actions/upload-artifact@v7
      with:
        name: HMCL-${{ env.SHORT_SHA }}-jar
        path: HMCL/build/libs/HMCL-*.jar
        archive: false
    - name: Upload EXE
      uses: actions/upload-artifact@v7
      with:
        name: HMCL-${{ env.SHORT_SHA }}-exe
        path: HMCL/build/libs/HMCL-*.exe
        archive: false
    - name: Upload SH
      uses: actions/upload-artifact@v7
      with:
        name: HMCL-${{ env.SHORT_SHA }}-sh
        path: HMCL/build/libs/HMCL-*.sh
        archive: false
    - name: Upload DEB
      uses: actions/upload-artifact@v7
      with:
        name: HMCL-${{ env.SHORT_SHA }}-deb
        path: HMCL/build/libs/HMCL-*.deb
        archive: false
